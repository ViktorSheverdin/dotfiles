# When updating config file, run `tmux source ~/.tmux.conf`

# Installs Tmux Plugin manager
set -g @plugin 'tmux-plugins/tpm'
# Install tmux ressurrect to bring all sessions back after resturt
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Installs and enables saving state of tmux sessions every 15 min
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Enabled vim keys in tmux
setw -g mode-keys vi
# Enable wl-copy to yank from tmux
bind -T copy-mode-vi v send -X begin-selection
# Disable autoscroll down after copy by removing -and-cancel
bind -T copy-mode-vi y send -X copy-pipe "wl-copy"

# moves the current window one position to the left in the tab bar, and follows it
bind-key -r < swap-window -t -1\; select-window -t -1
bind-key -r > swap-window -t +1\; select-window -t +1

# Smart pane switching with awareness of Vim splits
# Use C-hjkl to move around like in nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Bind C-hjkl to switch views when in the copy mode in tmux to retain scroll of the view
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Bind S-C to open a new pane with 30% width and launches Claude Code
# -c "#{pane_current_path}" sets the working directory to the current pane's directory, then "claude" runs it in the new pane.
# -h - vertical split (side by side)
bind C split-window -h -l 30% -c "#{pane_current_path}" "claude"

run '~/.tmux/plugins/tpm/tpm'
