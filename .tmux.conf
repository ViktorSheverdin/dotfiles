# When updating config file, run `tmux source ~/.tmux.conf`

# Installs Tmux Plugin manager
set -g @plugin 'tmux-plugins/tpm'
# Install tmux ressurrect to bring all sessions back after resturt
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Installs and enables saving state of tmux sessions every 15 min
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
# Install vim-tmux-navigator. It already comes with presets for hjkl and different mode navigation
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enabled mouse
set -g mouse on
# don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane 

# Enabled vim keys in tmux
setw -g mode-keys vi
# Enable wl-copy to yank from tmux
bind -T copy-mode-vi v send -X begin-selection
# Disable autoscroll down after copy by removing -and-cancel
bind -T copy-mode-vi y send -X copy-pipe "wl-copy"

# moves the current window one position to the left in the tab bar, and follows it
bind-key -r < swap-window -t -1\; select-window -t -1
bind-key -r > swap-window -t +1\; select-window -t +1

# Bind S-C to open a new pane with 30% width and launches Claude Code
# -c "#{pane_current_path}" sets the working directory to the current pane's directory, then "claude" runs it in the new pane.
# -h - vertical split (side by side)
bind C split-window -h -l 30% -c "#{pane_current_path}" "claude"

# Theme 
# PowerKit plugin
set -g @plugin 'fabioluciano/tmux-powerkit'
# Basic configuration
set -g @powerkit_plugins "datetime,battery,cpu,memory,wifi,weather,netspeed"

set -g @powerkit_plugin_weather_location "Burnaby"

# Units: m (metric/Celsius), u (US/Fahrenheit), M (SI/Kelvin)
set -g @powerkit_plugin_weather_units "m"

# Format string (%t=temp, %c=condition icon, %C=condition text, %w=wind, %h=humidity)
set -g @powerkit_plugin_weather_format "%t"

# Language code (optional)
set -g @powerkit_plugin_weather_language ""

# Hide + sign on positive temperatures (default: true)
set -g @powerkit_plugin_weather_hide_plus_sign "true"

# Icon (used when icon_mode is static)
set -g @powerkit_plugin_weather_icon "󰖐"

# Icon mode: static (use icon option) or dynamic (use weather condition symbol from API)
set -g @powerkit_plugin_weather_icon_mode "dynamic"

# Cache duration (seconds) - weather updates slowly
set -g @powerkit_plugin_weather_cache_ttl "1800"
# Tokyo Night - Night variant
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"
# Choose your separator style
set -g @powerkit_separator_style "normal"  # or normal, flame, pixel, honeycomb

# Enable spacing between elements
set -g @powerkit_elements_spacing "false"

# Customize update interval
set -g @powerkit_status_interval "5"
set -g @powerkit_status_position "bottom"

# Make it transparent
set -g @powerkit_transparent "true"

