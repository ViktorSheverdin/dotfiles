# Add empty spacer line above status bar (swap format[0] to format[1], clear format[0] as spacer)
run-shell 'tmux set -g status 2 \; set -g "status-format[1]" "$(tmux show -gv "status-format[0]")" \; set -g "status-format[0]" ""'
